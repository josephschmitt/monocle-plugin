name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build channel bundle
        run: bun run build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: channel.bundle.js
          generate_release_notes: true
